  <body>
    <div id="root">
      <style>
        body { background-color: #0f172a; margin: 0; }
        .initial-loader { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; background: #0f172a; }
        .initial-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 1s linear infinite; }

      </style>
      <div class="initial-loader"><div class="initial-spinner"></div></div>
    </div>
